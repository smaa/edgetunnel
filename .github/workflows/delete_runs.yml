name: Delete workflow runs
on: 
  workflow_dispatch: 
jobs:
  delete-runs: 
    name: delete runs
    runs-on: ubuntu-latest
    steps:
    - name: Delete workflow runs
    # 删除工作流记录/只保留5天记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
